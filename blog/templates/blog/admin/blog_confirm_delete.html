{% extends 'blog/base.html' %}

{% block title %}Supprimer Article - BlogPython{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-md p-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">Supprimer Article</h1>
            <p class="text-gray-600 mb-6">Êtes-vous sûr de vouloir supprimer l'article "{{ blog.title }}" ? Cette action est irréversible.</p>
            
            <div class="flex justify-between">
                <a href="{% url 'blog_list' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-6 py-2 rounded-md font-medium transition-colors">
                    Annuler
                </a>
                <form method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-md font-medium transition-colors btn-hover">
                        Supprimer
                    </button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
