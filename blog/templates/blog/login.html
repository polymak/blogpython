{% extends 'blog/base.html' %}

{% block title %}Login - BlogPython{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-md p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Administration</h2>
                <p class="text-gray-600 mt-2">Connectez-vous pour accéder au tableau de bord</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Nom d'utilisateur</label>
                        <input type="text" name="username" id="username" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                        <input type="password" name="password" id="password" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <div>
                        <button type="submit" 
                                class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-md font-medium transition-colors btn-hover">
                            Se connecter
                        </button>
                    </div>
                </div>
            </form>

            <div class="mt-6 text-center text-sm text-gray-600">
                <p>Identifiants par défaut:</p>
                <p class="font-mono">Admin / Poly123456</p>
            </div>
        </div>
    </div>
{% endblock %}
